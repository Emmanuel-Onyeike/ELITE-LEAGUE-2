<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
  apiKey: "AIzaSyCR_L7OutBlVEmEl57Z7xrpC3rKdCnte3M",
  authDomain: "elite-league-2.firebaseapp.com",
  databaseURL: "https://elite-league-2-default-rtdb.firebaseio.com",
  projectId: "elite-league-2",
  storageBucket: "elite-league-2.firebasestorage.app",
  messagingSenderId: "327742283927",
  appId: "1:327742283927:web:ad3247aa41aaad5a6609d2"
};

firebase.initializeApp(firebaseConfig);

const liveRef = firebase.database().ref('liveMatch');
const fixturesRef = firebase.database().ref('fixtures');

// Real-time Live Match
liveRef.on('value', (snapshot) => {
  const match = snapshot.val();
  renderLiveMatch(match);
});

function renderLiveMatch(match) {
  const container = document.getElementById('live-matches-container');
  container.innerHTML = '';
  
  if (!match) {
    container.innerHTML = `
      <div class="live-card" style="text-align:center;padding:48px;">
        <div style="font-size:48px;margin-bottom:16px;">📡</div>
        <div style="font-size:18px;font-weight:700;color:#64748B;">NO ACTIVE MATCHES</div>
      </div>
    `;
    return;
  }

  const div = document.createElement('div');
  div.className = "live-card";
  div.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-size:14px;font-weight:700;color:#FF4A4A;">LIVE • ${match.minute || '45'}'</div>
      <div style="color:var(--neon);font-size:13px;">${match.venue || 'Main Pitch'}</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;font-size:28px;font-weight:900;">
      <div>${match.home || 'HOME'} <span style="color:#00FF88;">${match.homeScore || 0}</span></div>
      <div style="font-size:18px;color:#64748B;">VS</div>
      <div style="text-align:right;">${match.away || 'AWAY'} <span style="color:#00FF88;">${match.awayScore || 0}</span></div>
    </div>
  `;
  container.appendChild(div);
}

// Tab Switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('[data-panel]').forEach(p => p.style.display = 'none');
    document.getElementById(tab.getAttribute('data-tab') + '-panel-container').style.display = 'block';
  });
});

// Notification Permission
if ("Notification" in window) {
  Notification.requestPermission();
}

window.onload = () => {
  console.log("%c✅ Live Centre connected to Firebase Realtime Database", "color:#00FF88");
};
</script>
